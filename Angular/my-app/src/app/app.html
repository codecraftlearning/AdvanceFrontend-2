Angular lifecycle hooks define execution points in a component/directive from creation to destruction. Order is deterministic.

Creation phase

constructor()
Class instantiation. Dependency injection only. No Angular bindings available.

ngOnChanges(changes: SimpleChanges)
Fires on every @Input change. Runs before ngOnInit. First call occurs during initialization.

ngOnInit()
Runs once after first ngOnChanges. Component initialized. Safe place for initial data load and setup.

ngDoCheck()
Custom change detection hook. Runs on every detection cycle. High-frequency; avoid heavy logic.

Content projection phase

ngAfterContentInit()
Runs once after external content projected via <ng-content>.

ngAfterContentChecked()
Runs after every check of projected content.

View phase

ngAfterViewInit()
Runs once after component view and child views initialized. DOM available.

ngAfterViewChecked()
Runs after every check of component and child views.

Destruction phase

ngOnDestroy()
Runs before component removal. Cleanup: unsubscribe, detach listeners, cancel timers.

Execution order (first render)
constructor → ngOnChanges → ngOnInit → ngDoCheck → ngAfterContentInit → ngAfterContentChecked → ngAfterViewInit → ngAfterViewChecked

Subsequent change detection cycles
ngOnChanges (if inputs changed) → ngDoCheck → ngAfterContentChecked → ngAfterViewChecked

Teardown
